<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>乐达助手 | 远程协助工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .content-padding {
            padding: 28px 24px 32px;
        }

        .app-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #1e2b3c, #0f2c3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .compatible-badge {
            background: #eff3f6;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #2c4b66;
            text-align: center;
            width: auto;
        }

        .data-interop {
            font-size: 13px;
            color: #5e6f8d;
            background: #f8f9fc;
            border-radius: 20px;
            padding: 8px 12px;
            margin-top: 12px;
            display: inline-block;
        }

        .divider {
            height: 1px;
            background: #e9edf2;
            margin: 20px 0;
        }

        .tip-section {
            background: #fef8e7;
            border-left: 4px solid #f5b042;
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 24px;
        }
.tip-title {
            font-weight: 700;
            font-size: 18px;
            color: #c47d2e;
            margin-bottom: 12px;
        }

        .tip-steps {
            list-style: none;
        }

        .tip-steps li {
            font-size: 14px;
            color: #4a3b1f;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        .step-num {
            background: #f5b042;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 30px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .qr-section {
            text-align: center;
            margin: 20px 0;
            background: #fafcff;
            border-radius: 32px;
            padding: 12px 12px 20px;
            border: 1px solid #eff3f8;
        }

        .qr-label {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .qr-code-box {
            display: flex;
            justify-content: center;
            margin: 12px auto;
        }

        .qr-canvas {
            width: 180px;
            height: 180px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #eef2f7;
            display: block;
        }
.scan-text {
            font-size: 14px;
            font-weight: 500;
            color: #2c6280;
            margin: 12px 0 4px;
        }

        .qr-hint {
            font-size: 12px;
            color: #8593aa;
            background: #f0f4fa;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .contact-card {
            background: #f5f9ff;
            border-radius: 28px;
            padding: 20px 18px;
            margin: 16px 0 20px;
        }

        .contact-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .wx-item {
            background: white;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #eef2f9;
        }
.wx-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wx-icon {
            background: #eef3fc;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .wx-number {
            font-weight: 700;
            font-size: 17px;
            color: #1a2c3f;
            font-family: monospace;
        }

        .copy-btn {
            background: white;
            border: 1px solid #cddfe7;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #2c7da0;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-btn:active {
            background: #e6f0f5;
            transform: scale(0.96);
        }

        .footer-slogan {
            text-align: center;
            padding: 18px 20px 20px;
            background: #fafdff;
            border-top: 1px solid #eff3f8;
        }

        .main-slogan {
            font-weight: 700;
            font-size: 17px;
            color: #173e4f;
        }

        .platforms {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 13px;
            color: #60758b;
            margin-top: 8px;
        }
.toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2c38e6;
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast-msg.show {
            opacity: 1;
        }

        button {
            background: none;
            border: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="content-padding">
        <div style="text-align: center;">
            <div class="app-title">乐达助手</div>
            <div class="compatible-badge">⚡ 鸿裕 · 乐达 · 乐事 · 乐运</div>
            <div class="data-interop">🔄 数据互通 · 多端通用</div>
        </div>
        <div class="divider"></div>

        <!-- 重要提示 -->
        <div class="tip-section">
            <div class="tip-title">📌 重要提示</div>
            <ul class="tip-steps">
                <li><span class="step-num">1</span><span>必须先扫码获取乐达助手注册下载权限</span></li>
                <li><span class="step-num">2</span><span>再进行注册下载安装APP</span></li>
                <li><span class="step-num">3</span><span>最后登录使用</span></li>
            </ul>
        </div>
<!-- 二维码区域（请将图片放到同一目录，并修改 src 路径） -->
        <div class="qr-section">
            <div class="qr-label">📱 扫码获取权限</div>
            <div class="qr-code-box">
                <img src="myqrcode.png" class="qr-canvas" alt="二维码" style="width:180px; height:180px;">
            </div>
            <div class="scan-text">⬇️ 扫下方二维码获取乐达助手注册下载权限 ⬇️</div>
            <div class="qr-hint">* 使用微信/浏览器扫码，开始下载</div>
        </div>

        <!-- 联系方式 -->
        <div class="contact-card">
            <div class="contact-title">💬 遇到问题？联系售后微信</div>
            <!-- 主微信号 -->
            <div class="wx-item">
                <div class="wx-info">
                    <div class="wx-icon">💚</div>
                    <div>
                        <div style="font-size:12px; color:#7791a8;">售后微信</div>
                        <div class="wx-number">zamyaz</div>
                    </div>
                </div>
                <button class="copy-btn" data-clipboard="zamyaz">📋 点击复制</button>
            </div>
            <!-- 备用微信号 -->
            <div class="wx-item">
                <div class="wx-info">
                    <div class="wx-icon">🔁</div>
                    <div>
                        <div style="font-size:12px; color:#7791a8;">备用号</div>
                        <div class="wx-number">xymy865</div>
                    </div>
                </div>
                <button class="copy-btn" data-clipboard="xymy865">📋 点击复制</button>
            </div>
            <div class="subnote" style="font-size:12px; color:#7c8ba0; text-align:center; margin-top:12px;">
                👆 点击复制微信号，打开微信添加好友
            </div>
        </div>
    </div>

    <div class="footer-slogan">
        <div class="main-slogan">🚀 乐达助手 —— 高效便捷的远程协助工具</div>
        <div class="platforms">
            <span>🪟 Windows</span>
            <span>🍎 macOS</span>
            <span>🐧 Linux</span>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">已复制微信号</div>
<script>
    // 复制功能
    const toast = document.getElementById('toastMsg');
    let timer = null;

    function showMessage(text) {
        toast.innerText = text || '已复制微信号';
        toast.classList.add('show');
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    async function copyText(content) {
        try {
            await navigator.clipboard.writeText(content);
            showMessage(`✅ 已复制 ${content}`);
        } catch (e) {
            const textarea = document.createElement('textarea');
            textarea.value = content;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showMessage(`📋 复制成功 ${content}`);
        }
    }

    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const val = btn.getAttribute('data-clipboard');
            if (val) copyText(val);
        });
    });
</script>
</body>
</html>
